<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <title>Github Tracker Login</title>
</head>

<body class="bg-slate-100">

  <main class="py-20 px-4">

    <div class="max-w-md bg-white mx-auto p-8 rounded-xl shadow-xl">

      <div class="text-center">
        <img src="assets/github-logo.png" class="mx-auto">
        <h2 class="text-2xl font-semibold mt-4">Github Issue Manager</h2>
        <p class="text-gray-500 mb-6">Login to continue</p>
      </div>

      <div class="flex flex-col gap-2">

        <label>Username</label>
        <input id="loginUser" class="input input-bordered w-full" placeholder="Type username">

        <label class="mt-3">Password</label>
        <input id="loginPass" type="password" class="input input-bordered w-full" placeholder="Type password">

        <button id="loginButton" class="btn btn-primary mt-5 w-full">
          Sign In
        </button>

      </div>

      <div class="text-center mt-6 text-sm">
        <p>Demo Login</p>
        <p><b>Username:</b> admin</p>
        <p><b>Password:</b> admin123</p>
      </div>

    </div>

  </main>


  <dialog id="errorModal" class="modal">
    <div class="modal-box">
      <h3 class="font-bold text-red-500">Login Failed</h3>
      <p class="py-4">Wrong username or password</p>
      <div class="modal-action">
        <form method="dialog">
          <button class="btn">Close</button>
        </form>
      </div>
    </div>
  </dialog>

  <script src="scripts/login.js"></script>

</body>

</html>
